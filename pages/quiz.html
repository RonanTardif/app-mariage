<div class="card">
  <div class="card-inner">
    <h2 class="card-title">Quiz Ronan & Lorie</h2>
    <p class="card-subtitle">Réponds aux questions et valide pour enregistrer ton score.</p>

    <div class="hr"></div>

    <div class="search">
      <input id="playerName" type="text" placeholder="Ton prénom / pseudo" autocomplete="off" />
    </div>

    <div class="hr"></div>

    <div id="quizContainer" class="list"></div>

    <div class="hr"></div>

    <button id="submitQuiz" class="btn" type="button" style="justify-content:space-between;">
      <div style="display:flex; gap:12px; align-items:center;">
        <div class="icon rose">✅</div>
        <div class="btn-text">
          <div class="btn-title">Valider</div>
          <div class="btn-desc">Enregistrer mon score</div>
        </div>
      </div>
      <div class="badge">→</div>
    </button>

    <div id="quizResult" style="margin-top: 12px;"></div>

    <p class="small" style="margin-top: 12px;">
      Pour la projection : ouvre <a href="#/leaderboard"><b>Leaderboard</b></a>.
    </p>
  </div>
</div>
