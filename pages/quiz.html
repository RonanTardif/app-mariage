<div class="card">
  <div class="card-inner">
    <h2 class="card-title">Quiz Ronan & Lorie</h2>
    <p class="card-subtitle">Réponds aux questions : le quiz passe automatiquement à la suivante après chaque réponse.</p>

    <div class="hr"></div>

    <div id="quizContainer" class="list"></div>

    <div id="finalStep" style="display:none;">
      <div class="hr"></div>

      <div id="playerNameStep" class="search" style="display:flex; flex-direction:column; gap:8px; margin-top:12px;">
        <label for="playerName" class="small" style="font-weight:700;">Entre ton prénom / pseudo pour envoyer ton résultat</label>
        <input id="playerName" type="text" placeholder="Ton prénom / pseudo" autocomplete="off" />
      </div>

      <div class="hr"></div>

      <button id="submitQuiz" class="btn" type="button" style="justify-content:space-between;">
        <div style="display:flex; gap:12px; align-items:center;">
          <div class="icon rose">✅</div>
          <div class="btn-text">
            <div class="btn-title">Envoyer</div>
            <div class="btn-desc">Confirmer mon résultat</div>
          </div>
        </div>
        <div class="badge">→</div>
      </button>
    </div>

    <div id="quizResult" style="margin-top: 12px;"></div>
  </div>
</div>
