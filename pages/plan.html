<div class="card plan-page" data-no-tap-zoom="true">
  <div class="card-inner">
    <h2 class="card-title">Plan du domaine</h2>
    <p class="card-subtitle">Clique sur un bâtiment pour afficher sa description.</p>

    <div class="hr"></div>

    <div
      id="domainMap"
      class="domain-map"
      aria-label="Plan interactif du domaine"
      data-map-image="./assets/plan-domaine.jpg"
    ></div>
    <div class="map-carousel" aria-label="Défilement des lieux">
      <button id="placePrev" class="btn map-carousel-nav" type="button" aria-label="Lieu précédent">←</button>
      <div id="placeDetail" class="list-item map-detail" aria-live="polite"></div>
      <button id="placeNext" class="btn map-carousel-nav" type="button" aria-label="Lieu suivant">→</button>
    </div>

  </div>
</div>
