<div class="card">
  <div class="card-inner">
    <h2 class="card-title">Plan du domaine</h2>
    <p class="card-subtitle">Clique sur un bâtiment pour afficher sa description.</p>

    <div class="hr"></div>

    <div
      id="domainMap"
      class="domain-map"
      aria-label="Plan interactif du domaine"
      data-map-svg="./assets/plan-domaine.svg"
    ></div>
    <p class="map-help">Astuce : place ton fichier dans <code>assets/plan-domaine.svg</code>.</p>

    <div id="placeDetail" class="list-item map-detail" aria-live="polite"></div>

    <div id="placeShortcuts" class="map-shortcuts"></div>
  </div>
</div>
