<div class="card">
  <div class="card-inner">
    <h2 class="card-title">Trouver mon créneau photo</h2>
    <p class="card-subtitle">Recherche par nom. Lieu : <b>Lac</b> 📍</p>

    <div class="hr"></div>

    <div class="search">
      <input id="photoSearch" type="text" placeholder="Rechercher…" autocomplete="off" />
    </div>

    <div style="margin-top: 12px;" id="photoResult"></div>

    <p class="small" style="margin-top: 12px;">
      Si tu es en retard, viens quand même : on s’arrangera 🙂
    </p>
  </div>
</div>

<script type="module">
  import { fetchJSON, normalizeName, escapeHTML, renderNotFound } from "./assets/ui.js";

  window.__initPage = async () => {
    const slots = await fetchJSON("./data/photo_slots.json");
    const input = document.getElementById("photoSearch");
    const result = document.getElementById("photoResult");

    function render(matches) {
      if (!matches.length) {
        result.innerHTML = renderNotFound("Aucun résultat pour le moment.");
        return;
      }

      result.innerHTML = matches
        .slice(0, 5)
        .map((s) => {
          return `
            <div class="card" style="box-shadow:none;">
              <div class="card-inner">
                <div class="badge">📸 Photos de groupe</div>
                <h3 class="card-title" style="margin-top:10px;">${escapeHTML(s.full_name)}</h3>

                <div class="kv">
                  <div class="kv-row">
                    <div class="kv-key">Créneau</div>
                    <div class="kv-val">${escapeHTML(s.slot_time)}</div>
                  </div>
                  <div class="kv-row">
                    <div class="kv-key">Lieu</div>
                    <div class="kv-val">${escapeHTML(s.location || "Lac")}</div>
                  </div>
                </div>
              </div>
            </div>
          `;
        })
        .join("");
    }

    function search() {
      const q = normalizeName(input.value);
      if (!q) {
        result.innerHTML = "";
        return;
      }
      const matches = slots.filter((r) => normalizeName(r.full_name).includes(q));
      render(matches);
    }

    input.addEventListener("input", search);
  };
</script>
