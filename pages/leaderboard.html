<div class="card">
  <div class="card-inner projection">
    <h2 class="big-title">Quiz Ronan & Lorie 🏆</h2>
    <p class="big-sub">Top 10 — Dernière mise à jour : <b id="lbTime">--:--</b></p>

    <div class="hr"></div>

    <table class="table" aria-label="Leaderboard">
      <thead>
        <tr>
          <th>#</th>
          <th>Pseudo</th>
          <th>Score</th>
          <th>Heure</th>
        </tr>
      </thead>
      <tbody id="lbBody"></tbody>
    </table>

    <div class="hr"></div>

    <div class="grid two">
      <button id="resetScores" class="btn" type="button">
        <div class="icon gray">🧹</div>
        <div class="btn-text">
          <div class="btn-title">Reset local</div>
          <div class="btn-desc">Efface les scores sur cet appareil</div>
        </div>
      </button>

      <a class="btn" href="#/quiz">
        <div class="icon rose">🎯</div>
        <div class="btn-text">
          <div class="btn-title">Jouer</div>
          <div class="btn-desc">Retour au quiz</div>
        </div>
      </a>
    </div>

    <p class="small" style="margin-top: 12px;">
      MVP = localStorage (scores sur cet appareil).
    </p>
  </div>
</div>
