<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mariage Ronan & Lorie</title>
    <meta name="theme-color" content="#9BAA9A" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <a class="brand" href="#/home" aria-label="Accueil">
          <div class="brand-mark">R ♥ L</div>
          <div class="brand-text">
            <div class="brand-title">Ronan & Lorie</div>
            <div class="brand-subtitle">Tout le week-end dans ta poche</div>
          </div>
        </a>

        <div class="topbar-right">
          <div class="chip">
            <span class="chip-label">Heure</span>
            <span id="clock" class="chip-value">--:--</span>
          </div>
        </div>
      </header>

      <main class="content">
        <div id="view" class="view" aria-live="polite"></div>
      </main>

      <nav class="bottom-nav" aria-label="Navigation">
        <a href="#/home" class="nav-item" data-route="/home">Home</a>
        <a href="#/programme" class="nav-item" data-route="/programme">Programme</a>
        <a href="#/plan" class="nav-item" data-route="/plan">Plan</a>
        <a href="#/chambre" class="nav-item" data-route="/chambre">Chambre</a>
        <a href="#/photos" class="nav-item" data-route="/photos">Photos</a>
      </nav>
    </div>

    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
